<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 运营工坊 — 多平台内容智能运营</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800;900&family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* Critical loading state */
    #root:empty::after {
      content: '';
      display: block;
      width: 32px;
      height: 32px;
      margin: 40vh auto;
      border: 2px solid #e5e5e0;
      border-top-color: #10b981;
      border-radius: 50%;
      animation: initial-spin 0.8s linear infinite;
    }
    @keyframes initial-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
